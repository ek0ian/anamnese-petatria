services:
  mongodb:
    image: mongo:7
    container_name: mongodb-petatria
    restart: unless-stopped
    ports:
      # Host:Container. Usa 27018 no host para evitar conflito com outros
      # projetos que mapeiam o MongoDB padrao em 27017.
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-petatria}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-petatria123}
      MONGO_INITDB_DATABASE: anamnese_petatria
    volumes:
      - petatria_mongo_data:/data/db

  mongo-express:
    image: mongo-express:1
    container_name: mongo-express-petatria
    restart: unless-stopped
    ports:
      - "8082:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER:-petatria}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASS:-petatria123}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER:-petatria}:${MONGO_PASS:-petatria123}@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongodb

volumes:
  petatria_mongo_data:
    name: petatria_mongo_data
